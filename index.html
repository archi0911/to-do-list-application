<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do-List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <form>
    <h1>To-Do-List</h1>
    <div>
      <button type="button" id="add-button" onclick="addButton()">Add Task</button>
      <button type="button" id="update-button"onclick="updateButton()">Update Task</button>
      <button type="button" id="delete-button"onclick="deleteData()">Delete Task</button>
      <!-- <button type="button" onclick="addButton()">View To-Do-List</button> -->
    </div>

    <br>

    <div id="input">
      <input type="text" id="add-task" placeholder="Add task here"> 
      <button type="button" id="ok" onclick="storeData()">OK</button>
    </div>
		<br>

		<div id="input">
      <input type="text" id="update-task" placeholder="Enter the No which you want to update"> 
      <button type="button" id="update" onclick="updateData()">Update</button>
    </div>
		<br>

    <div id="list">
	    <h1>List</h1>
		</div>

  </form>
  <script src="script.js"></script>
</body>
</html>
