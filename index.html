<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do-List</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>
<body>
  <form>
    <h1>To-Do-List</h1>
    <div>
      <button type="button" id="add-btn" onclick="addButton()">Add Task</button>
      <button type="button" id="view-btn" onclick="viewList()">View List</button>
    </div>
    <br>

    <div id="task">
      <input type="text" id="task-textbox" placeholder="Enter Task here">
      <button type="button" id="ok-btn" onclick="addTask()">OK</button>
    </div>

		<br><br>
    <div id="list"></div>
		<br><br>

    <div id="completed-list"></div>


  </form>
  <script src="script.js"></script>
</body>
</html>
